<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexedDB Web App & Game Launcher</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar File Explorer */
        #sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
            transition: transform 0.2s ease, width 0.2s;
        }

        #sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn {
            border: 1px solid var(--border);
            color: white;
            background-color: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .btn-secondary { background-color: #475569; }
        .btn-green { background-color: #10b981; margin-bottom: 8px; }
        .btn-red { background-color: #ef4444; margin-top: 5px; }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #upload-status {
            font-size: 0.8rem;
            color: #10b981;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: center;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            list-style: none;
            margin: 0;
        }

        .file-item {
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover { background: rgba(255, 255, 255, 0.05); }
        .file-item.active { background: var(--accent); }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            padding: 0 4px;
            display: none;
        }
        .file-item:hover .delete-btn { display: inline; }

        /* Main Playback Area */
        #main-content {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: #000;
        }

        #placeholder {
            color: var(--text-muted);
            text-align: center;
        }

        /* Control Layer Panel */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            width: 260px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            transition: opacity 0.2s, transform 0.2s;
        }
        #control-panel.hidden {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .panel-section { margin-bottom: 15px; }
        .panel-section h3 {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            color: var(--text-muted);
        }

        .control-group { margin-bottom: 8px; }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin: 0;
        }

        .ui-hints {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 99;
            color: var(--text-muted);
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Launcher</h2>
            <button class="btn btn-green" id="fullscreen-btn">⛶ Fullscreen Game</button>
            <div id="upload-status"></div>
            <div class="upload-btn-wrapper">
                <button class="btn">📁 Upload Directory</button>
                <input type="file" id="dir-upload" webkitdirectory directory multiple />
            </div>
            <div class="upload-btn-wrapper">
                <button class="btn btn-secondary">📄 Upload Single HTML</button>
                <input type="file" id="file-upload" accept=".html,.htm" />
            </div>
            <button class="btn btn-red" id="clear-db-btn">⚠️ Clear Storage</button>
        </div>
        <ul id="file-tree"></ul>
    </div>

    <div id="main-content">
        <div id="placeholder">
            <h3>No Application Running</h3>
            <p>Upload a folder or file, then select your entry HTML file to boot.</p>
        </div>
        <iframe id="game-frame" style="display: none;" 
            allow="cross-origin-isolated; autoplay; pointer-lock; keyboard; microphone; fullscreen" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
    </div>

    <div class="ui-hints">
        Press <strong>ESC</strong> to unlock mouse<br>
        Press <strong>H</strong> for Video/Audio Panel<br>
        Press <strong>J</strong> to toggle Sidebar
    </div>

    <div id="control-panel" class="hidden">
        <div class="panel-section">
            <h3>Video Correction</h3>
            <div class="control-group">
                <label><span>Brightness</span><span id="val-brightness">100%</span></label>
                <input type="range" id="vid-brightness" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Contrast</span><span id="val-contrast">100%</span></label>
                <input type="range" id="vid-contrast" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Saturation</span><span id="val-saturation">100%</span></label>
                <input type="range" id="vid-saturation" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Gamma Factor</span><span id="val-gamma">1.0x</span></label>
                <input type="range" id="vid-gamma" min="40" max="180" value="100">
            </div>
            <div class="control-group">
                <label><span>Invert Spectrum</span><span id="val-invert">0%</span></label>
                <input type="range" id="vid-invert" min="0" max="100" value="0">
            </div>
        </div>
    </div>

    <script>
        // --- Core Application State ---
        let db = null;
        const DB_NAME = "LocalAppLauncherDB";
        const STORE_NAME = "virtual_files";
        const gameFrame = document.getElementById('game-frame');
        const placeholder = document.getElementById('placeholder');
        const fileTree = document.getElementById('file-tree');
        const controlPanel = document.getElementById('control-panel');
        const sidebar = document.getElementById('sidebar');
        const statusText = document.getElementById('upload-status');

        // --- Initialize IndexedDB Backend ---
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: "path" });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderFileTree();
        };
        request.onerror = (e) => console.error("IndexedDB Open Error:", e);

        // --- Queue-Based File Ingestion (Performance Fix) ---
        document.getElementById('file-upload').addEventListener('change', (e) => handleUpload(e.target.files, false));
        document.getElementById('dir-upload').addEventListener('change', (e) => handleUpload(e.target.files, true));

        function handleUpload(files, isDirectory) {
            if (!db || files.length === 0) return;
            
            const totalFiles = files.length;
            let currentIndex = 0;
            const batchSize = 50; // Process 50 files per animation frame to prevent freezing

            statusText.textContent = `Queuing ${totalFiles} files...`;

            function processNextBatch() {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                
                const end = Math.min(currentIndex + batchSize, totalFiles);
                
                for (let i = currentIndex; i < end; i++) {
                    const file = files[i];
                    // Path resolver accounts for single files vs folders
                    const path = (isDirectory && file.webkitRelativePath) ? file.webkitRelativePath : file.name;
                    
                    if (path.includes('.DS_Store') || path.includes('__MACOSX')) continue;

                    const blob = new Blob([file], { type: file.type });
                    store.put({
                        path: path,
                        name: file.name,
                        blob: blob,
                        mimeType: file.type || getMimeTypeByExtension(file.name)
                    });
                }

                transaction.oncomplete = () => {
                    currentIndex = end;
                    statusText.textContent = `Uploaded ${currentIndex} / ${totalFiles}`;
                    
                    if (currentIndex < totalFiles) {
                        // Yield to main thread, then process next batch
                        requestAnimationFrame(processNextBatch);
                    } else {
                        statusText.textContent = ""; // Clear status
                        renderFileTree();
                    }
                };
            }
            
            processNextBatch();
        }

        // --- Render UI Navigator ---
        function renderFileTree() {
            fileTree.innerHTML = "";
            if (!db) return;

            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            
            store.getAll().onsuccess = (e) => {
                const allFiles = e.target.result;
                const launchable = allFiles.filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));

                if (launchable.length === 0) {
                    fileTree.innerHTML = `<li style="padding:10px; color:var(--text-muted); font-size:0.8rem;">No execution maps loaded.</li>`;
                    return;
                }

                // Sort alphabetically
                launchable.sort((a, b) => a.path.localeCompare(b.path)).forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `<span>📄 ${file.name}</span><button class="delete-btn" data-path="${file.path}">×</button>`;
                    li.title = file.path; // Hover to see full path
                    
                    li.addEventListener('click', (e) => {
                        if (e.target.className === 'delete-btn') return;
                        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        bootVirtualApplication(file.path, allFiles);
                        // Auto-hide sidebar to give game room
                        if(window.innerWidth < 1000) sidebar.classList.add('hidden');
                    });

                    li.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteAsset(file.path);
                    });

                    fileTree.appendChild(li);
                });
            };
        }

        // --- Execution Sandbox Router (The Core Engine) ---
        function bootVirtualApplication(entryPath, allFiles) {
            placeholder.style.display = 'none';
            gameFrame.style.display = 'block';
            
            // Force focus so the game grabs keyboard events natively
            gameFrame.focus();

            const virtualFileSystem = {};
            allFiles.forEach(file => {
                virtualFileSystem[file.path] = URL.createObjectURL(file.blob);
            });

            const entryBlob = allFiles.find(f => f.path === entryPath).blob;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                let htmlContent = e.target.result;

                // Path resolution logic fixed for single-files without parent directories
                const hasDir = entryPath.includes('/');
                const currentDir = hasDir ? entryPath.substring(0, entryPath.lastIndexOf('/')) : '';

                for (const [realPath, blobUrl] of Object.entries(virtualFileSystem)) {
                    let relativeToken = realPath;
                    if (currentDir && realPath.startsWith(currentDir + '/')) {
                        relativeToken = realPath.substring(currentDir.length + 1);
                    }
                    
                    const safeToken = relativeToken.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const re = new RegExp(`(["'])(./)?${safeToken}(["'])`, 'g');
                    htmlContent = htmlContent.replace(re, `$1${blobUrl}$3`);
                }

                const modifiedBlob = new Blob([htmlContent], { type: 'text/html' });
                gameFrame.src = URL.createObjectURL(modifiedBlob);
            };
            
            reader.readAsText(entryBlob);
        }

        // --- Fullscreen API Request ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (gameFrame.style.display === 'none') {
                alert("Launch a game first before going fullscreen.");
                return;
            }
            if (gameFrame.requestFullscreen) {
                gameFrame.requestFullscreen();
            } else if (gameFrame.webkitRequestFullscreen) { /* Safari */
                gameFrame.webkitRequestFullscreen();
            }
            // Forcing focus after fullscreen ensures pointerlock engages easily
            setTimeout(() => gameFrame.focus(), 100); 
        });

        // --- Destruction Routines ---
        function deleteAsset(path) {
            const transaction = db.transaction([STORE_NAME], "readwrite");
            transaction.objectStore(STORE_NAME).delete(path);
            transaction.oncomplete = () => renderFileTree();
        }

        document.getElementById('clear-db-btn').addEventListener('click', () => {
            if (confirm("Confirm database wipe? All cached offline files will be purged.")) {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                transaction.objectStore(STORE_NAME).clear();
                transaction.oncomplete = () => {
                    gameFrame.src = "about:blank";
                    gameFrame.style.display = 'none';
                    placeholder.style.display = 'block';
                    renderFileTree();
                };
            }
        });

        // --- UI Controller Layer Mapping (Interaction Lockouts) ---
        window.addEventListener('keydown', (e) => {
            // CRITICAL: Prevent menus from opening if the user is playing the game
            const isPlaying = document.pointerLockElement !== null || 
                              document.fullscreenElement !== null ||
                              document.activeElement === gameFrame;
            
            if (isPlaying) return; // Ignore keys if focused on game frame

            if (e.key.toLowerCase() === 'h') {
                controlPanel.classList.toggle('hidden');
            }
            if (e.key.toLowerCase() === 'j') {
                sidebar.classList.toggle('hidden');
            }
        });

        // Listen for clicks outside the frame to re-enable menu toggles
        window.addEventListener('click', () => {
            if (document.activeElement !== gameFrame) {
                // Focus left the game iframe, hotkeys will work again natively
            }
        });

        // --- Video Signal Filters ---
        const applyVideoFilters = () => {
            const b = document.getElementById('vid-brightness').value;
            const c = document.getElementById('vid-contrast').value;
            const s = document.getElementById('vid-saturation').value;
            const i = document.getElementById('vid-invert').value;
            const g = document.getElementById('vid-gamma').value / 100;

            document.getElementById('val-brightness').textContent = `${b}%`;
            document.getElementById('val-contrast').textContent = `${c}%`;
            document.getElementById('val-saturation').textContent = `${s}%`;
            document.getElementById('val-gamma').textContent = `${g.toFixed(1)}x`;
            document.getElementById('val-invert').textContent = `${i}%`;

            gameFrame.style.filter = `
                brightness(${b}%) 
                contrast(${c}%) 
                saturate(${s}%) 
                invert(${i}%)
                brightness(${g})
            `;
        };

        ['brightness', 'contrast', 'saturation', 'gamma', 'invert'].forEach(id => {
            document.getElementById(`vid-${id}`).addEventListener('input', applyVideoFilters);
        });

        // --- Mime Type Inference Helper ---
        function getMimeTypeByExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const map = {
                'html': 'text/html', 'htm': 'text/html',
                'js': 'application/javascript', 'json': 'application/json',
                'css': 'text/css', 'wasm': 'application/wasm',
                'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
                'gif': 'image/gif', 'svg': 'image/svg+xml'
            };
            return map[ext] || 'application/octet-stream';
        }
    </script>
</body>
</html>

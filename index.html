<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexedDB Web App & Game Launcher</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar File Explorer */
        #sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn {
            border: 1px solid var(--border);
            color: white;
            background-color: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .btn-secondary {
            background-color: #475569;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            list-style: none;
            margin: 0;
        }

        .file-item {
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: var(--accent);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            padding: 0 4px;
            display: none;
        }

        .file-item:hover .delete-btn {
            display: inline;
        }

        /* Main Playback Area */
        #main-content {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Target for video modifiers */
        }

        #placeholder {
            color: var(--text-muted);
            text-align: center;
        }

        /* Control Layer Panel */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            width: 260px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            transition: opacity 0.2s;
        }
        #control-panel.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .panel-section {
            margin-bottom: 15px;
        }
        .panel-section h3 {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            color: var(--text-muted);
        }

        .control-group {
            margin-bottom: 8px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin: 0;
        }

        #ui-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 99;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>App Launcher</h2>
            <div class="upload-btn-wrapper">
                <button class="btn">📁 Upload Directory</button>
                <input type="file" id="dir-upload" webkitdirectory directory multiple />
            </div>
            <div class="upload-btn-wrapper">
                <button class="btn btn-secondary">📄 Upload Single HTML</button>
                <input type="file" id="file-upload" accept=".html,.htm" />
            </div>
            <button class="btn" id="clear-db-btn" style="background: #ef4444; margin-top: 5px;">⚠️ Clear Storage</button>
        </div>
        <ul id="file-tree"></ul>
    </div>

    <div id="main-content">
        <div id="placeholder">
            <h3>No Application Running</h3>
            <p>Upload a folder or file, then select your entry HTML file to boot.</p>
        </div>
        <iframe id="game-frame" style="display: none;" allow="autoplay; pointer-lock; keyboard; microphone"></iframe>
    </div>

    <div id="ui-hint">Press <strong>H</strong> to toggle processing parameters panel.</div>

    <div id="control-panel">
        <div class="panel-section">
            <h3>Video Correction</h3>
            <div class="control-group">
                <label><span>Brightness</span><span id="val-brightness">100%</span></label>
                <input type="range" id="vid-brightness" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Contrast</span><span id="val-contrast">100%</span></label>
                <input type="range" id="vid-contrast" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Saturation</span><span id="val-saturation">100%</span></label>
                <input type="range" id="vid-saturation" min="0" max="250" value="100">
            </div>
            <div class="control-group">
                <label><span>Gamma Factor</span><span id="val-gamma">1.0x</span></label>
                <input type="range" id="vid-gamma" min="40" max="180" value="100">
            </div>
            <div class="control-group">
                <label><span>Invert Spectrum</span><span id="val-invert">0%</span></label>
                <input type="range" id="vid-invert" min="0" max="100" value="0">
            </div>
        </div>

        <div class="panel-section">
            <h3>Audio Engineering</h3>
            <p style="font-size:0.7rem; color:var(--text-muted); margin: 0 0 8px 0;">Requires client configuration alignment.</p>
            <div class="control-group">
                <label><span>Master Gain</span><span id="val-volume">100%</span></label>
                <input type="range" id="aud-volume" min="0" max="300" value="100">
            </div>
            <div class="control-group">
                <label><span>Sub-Bass</span><span id="val-low">0 dB</span></label>
                <input type="range" id="aud-low" min="-24" max="24" value="0">
            </div>
            <div class="control-group">
                <label><span>Mid Range</span><span id="val-mid">0 dB</span></label>
                <input type="range" id="aud-mid" min="-24" max="24" value="0">
            </div>
            <div class="control-group">
                <label><span>Treble</span><span id="val-high">0 dB</span></label>
                <input type="range" id="aud-high" min="-24" max="24" value="0">
            </div>
        </div>
    </div>

    <script>
        // --- Core Application State ---
        let db = null;
        const DB_NAME = "LocalAppLauncherDB";
        const STORE_NAME = "virtual_files";
        const gameFrame = document.getElementById('game-frame');
        const placeholder = document.getElementById('placeholder');
        const fileTree = document.getElementById('file-tree');
        const controlPanel = document.getElementById('control-panel');

        // --- Initialize IndexedDB Backend ---
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: "path" });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderFileTree();
        };
        request.onerror = (e) => console.error("IndexedDB Open Error:", e);

        // --- File Ingestion Handling ---
        document.getElementById('file-upload').addEventListener('change', (e) => handleUpload(e.target.files, false));
        document.getElementById('dir-upload').addEventListener('change', (e) => handleUpload(e.target.files, true));

        async function handleUpload(files, isDirectory) {
            if (!db || files.length === 0) return;
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);

            for (let file of files) {
                // Determine sandboxed lookup path
                const path = isDirectory ? file.webkitRelativePath : file.name;
                
                // Skip tracking structural operating system pollution
                if (path.includes('.DS_Store') || path.includes('__MACOSX')) continue;

                const blob = new Blob([file], { type: file.type });
                store.put({
                    path: path,
                    name: file.name,
                    blob: blob,
                    mimeType: file.type || getMimeTypeByExtension(file.name)
                });
            }

            transaction.oncomplete = () => {
                renderFileTree();
                alert("Assets successfully indexed to browser local database.");
            };
        }

        // --- Render UI Navigator ---
        function renderFileTree() {
            fileTree.innerHTML = "";
            if (!db) return;

            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            
            store.getAll().onsuccess = (e) => {
                const allFiles = e.target.result;
                // Highlight/filter runnable targets (HTML files)
                const launchable = allFiles.filter(f => f.name.endsWith('.html') || f.name.endsWith('.htm'));

                if (launchable.length === 0) {
                    fileTree.innerHTML = `<li style="padding:10px; color:var(--text-muted); font-size:0.8rem;">No execution maps loaded.</li>`;
                    return;
                }

                launchable.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `<span>📄 ${file.path}</span><button class="delete-btn" data-path="${file.path}">×</button>`;
                    
                    li.addEventListener('click', (e) => {
                        if (e.target.className === 'delete-btn') return;
                        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        bootVirtualApplication(file.path, allFiles);
                    });

                    li.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteAsset(file.path);
                    });

                    fileTree.appendChild(li);
                });
            };
        }

        // --- Execution Sandbox Router (The Core Engine) ---
        function bootVirtualApplication(entryPath, allFiles) {
            placeholder.style.display = 'none';
            gameFrame.style.display = 'block';

            // Convert all filesystem assets into virtual object-mapping reference lookups
            const virtualFileSystem = {};
            allFiles.forEach(file => {
                virtualFileSystem[file.path] = URL.createObjectURL(file.blob);
            });

            const entryBlob = allFiles.find(f => f.path === entryPath).blob;
            
            // Read entry HTML, intercept references dynamically 
            const reader = new FileReader();
            reader.onload = function(e) {
                let htmlContent = e.target.result;

                // Relative path pointer resolution algorithm
                const currentDir = entryPath.substring(0, entryPath.lastIndexOf('/'));

                // Intercept script paths, stylesheets, images, and assemblies (.wasm)
                // Swap relative pointers to browser local memory Blobs
                for (const [realPath, blobUrl] of Object.entries(virtualFileSystem)) {
                    let relativeToken = realPath;
                    if (currentDir && realPath.startsWith(currentDir + '/')) {
                        relativeToken = realPath.substring(currentDir.length + 1);
                    }
                    
                    // Direct replace string mappings safely via escaped RegExp patterns
                    const safeToken = relativeToken.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const re = new RegExp(`(["'])(./)?${safeToken}(["'])`, 'g');
                    htmlContent = htmlContent.replace(re, `$1${blobUrl}$3`);
                }

                // Inject sandbox patch configuration context directly 
                const modifiedBlob = new Blob([htmlContent], { type: 'text/html' });
                gameFrame.src = URL.createObjectURL(modifiedBlob);
            };
            
            reader.readAsText(entryBlob);
        }

        // --- Destruction Routines ---
        function deleteAsset(path) {
            const transaction = db.transaction([STORE_NAME], "readwrite");
            transaction.objectStore(STORE_NAME).delete(path);
            transaction.oncomplete = () => renderFileTree();
        }

        document.getElementById('clear-db-btn').addEventListener('click', () => {
            if (confirm("Confirm database wipe? All cached offline files will be purged.")) {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                transaction.objectStore(STORE_NAME).clear();
                transaction.oncomplete = () => {
                    gameFrame.src = "about:blank";
                    gameFrame.style.display = 'none';
                    placeholder.style.display = 'block';
                    renderFileTree();
                };
            }
        });

        // --- UI Controller Layer Mapping ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                controlPanel.classList.toggle('hidden');
            }
        });

        // Dynamic Filter Compiling Matrix
        const applyVideoFilters = () => {
            const b = document.getElementById('vid-brightness').value;
            const c = document.getElementById('vid-contrast').value;
            const s = document.getElementById('vid-saturation').value;
            const i = document.getElementById('vid-invert').value;
            const g = document.getElementById('vid-gamma').value / 100;

            document.getElementById('val-brightness').textContent = `${b}%`;
            document.getElementById('val-contrast').textContent = `${c}%`;
            document.getElementById('val-saturation').textContent = `${s}%`;
            document.getElementById('val-gamma').textContent = `${g.toFixed(1)}x`;
            document.getElementById('val-invert').textContent = `${i}%`;

            gameFrame.style.filter = `
                brightness(${b}%) 
                contrast(${c}%) 
                saturate(${s}%) 
                invert(${i}%)
                brightness(${g})
            `;
        };

        ['brightness', 'contrast', 'saturation', 'gamma', 'invert'].forEach(id => {
            document.getElementById(`vid-${id}`).addEventListener('input', applyVideoFilters);
        });

        // --- Fallback Type Inference Helper ---
        function getMimeTypeByExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const map = {
                'html': 'text/html', 'htm': 'text/html',
                'js': 'application/javascript', 'json': 'application/json',
                'css': 'text/css', 'wasm': 'application/wasm',
                'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
                'gif': 'image/gif', 'svg': 'image/svg+xml'
            };
            return map[ext] || 'application/octet-stream';
        }
    </script>
</body>
</html>
